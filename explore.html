<!DOCTYPE html>
<html lang="en">
<head id='pgHead'>
    <!--
    ALWAYS REMEMBER TO ADJUST STYLESHEET AND SCRIPT LINKS BASED ON PAGE LOCATION
    -->
    <link rel='stylesheet' href='files/setup/header/headerStyle.css'>
    <link rel="stylesheet" href="files/setup/styleSheet.css">
    <title>Explore | Visit Desert Springs</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>
    /* FILTER OPTIONS */
    .category-filter-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
    }
    
    .category-bubble {
        padding: 6px 12px;
        border-radius: 999px;
        background: #eef5fb;
        border: 1px solid #d3e5f6;
        cursor: pointer;
        font-size: 0.9rem;
        user-select: none;
    }
    
    .category-bubble:hover {
        background: #e2effc;
    }
    
    .category-bubble.selected {
        background: #0f6cbd;
        color: white;
        border-color: #0f6cbd;
    }

    .hidden {
        display: none;
    }

    /* RESULTS CONTAINER */
    tiles-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
    }
    
        /* Tablet */
        @media (max-width: 1000px) {
            .tiles-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* Mobile */
        @media (max-width: 700px) {
            .tiles-grid {
                grid-template-columns: 1fr;
            }
        }


    .tile {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        border: 1px solid #ddd;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    
    .tile:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 16px rgba(0,0,0,0.1);
    }
    
    /* Image */
    .tile img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        display: block;
    }
    
    /* Content */
    .tile-content {
        padding: 12px;
    }
    
    .tile-title {
        font-weight: 600;
        margin-bottom: 6px;
    }
    
    .tile-location {
        font-size: 0.9rem;
        color: #555;
        margin-bottom: 8px;
    }
    
    /* Category chips */
    .tile-categories {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
    }
    
    .tile-chip {
        background: #eef5fb;
        border: 1px solid #d3e5f6;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 0.8rem;
    }


</style>
    
<body onload='finishLoad();'>
    <div id='pgLoader'></div><div id='pgHeader'></div>

    <div class='section' style='margin-top:0;'>
        <div class='container'>
            <h1>Explore the City</h1>
            Browse various locations around Desert Springs. Click on a tile to view more information and coordinates.
        </div>
    </div>
    
    <div class='container'>
        <p style=''>📱 Filter by Category</p>
        <div id="categoryFilters" class="category-filter-wrap"></div>
        <p style=''>📍 Filter by Location</p>
        <div id="locationFilters" class="category-filter-wrap"></div>
        <a class='btn noLeft hidden' id="applyFilterBtn" style='cursor:pointer; font-size:0.9rem' onclick="applyCategoryFilter()">Apply search filters</a>
        <a class='btn' id="applyFilterBtn" style='cursor:pointer; font-size:0.9rem' onclick="clearFilters()">Clear filters</a>
    </div>

    <div class='spacer'></div>

    <div class='container'>
        <p id='resultsCounter'>Showing NUM results</p>
        <div id="tilesContainer" class="tiles-grid"></div>
    </div>
    
    <div id='pgFooter'></div>
</body>

<script src="files/setup/header/headerScript.js"></script>
<!-- Load these before the page script -->
<script src="files/repositories/basicInfo.js"></script>
<script src="files/repositories/places.js"></script>

<script>
    let selectedCategories = []; // categories for filtering if enabled
    let selectedLocations = []; // locations for filtering if selected

    // INITIALIZE PAGE (RUNS ON LOAD)
    function initExplorePage() {
        renderCategoryFilters();
        renderLocationFilters();

        const filters = getFiltersFromURL();
        
        selectedCategories = filters.categories;
        selectedLocations = filters.locations;

        applySelectedStyles();
        
        renderTiles(); // show the attractions
    }

    // FILTER BUTTONS -------------------------------
    
    // Setup Category Filter Bubbles
    function renderCategoryFilters() {
        const container = document.getElementById('categoryFilters');
        container.innerHTML = '';
    
        window.specificCategory.forEach((category, index) => {
            const bubble = document.createElement('div');
            bubble.className = 'category-bubble';
            bubble.textContent = category;
            bubble.dataset.index = index;
    
            bubble.addEventListener('click', () => toggleCategory(index, bubble));
    
            container.appendChild(bubble);
        });
    }

    // Setup location filter buttons
    function renderLocationFilters() {
        const container = document.getElementById('locationFilters');
        container.innerHTML = '';
    
        window.specificLocation.forEach((location, index) => {
            const bubble = document.createElement('div');
            bubble.className = 'category-bubble';
            bubble.textContent = location;
            bubble.dataset.index = index;
    
            bubble.addEventListener('click', () => toggleLocation(index, bubble));
    
            container.appendChild(bubble);
        });
    }


    // Function to run when a bubble is toggled
    function toggleCategory(index, bubble) {
        if (selectedCategories.includes(index)) {
            selectedCategories = selectedCategories.filter(i => i !== index);
            bubble.classList.remove('selected');
        } else {
            selectedCategories.push(index);
            bubble.classList.add('selected');
        }
    }

    // run when location filter toggle is selcted
    function toggleLocation(index, bubble) {
        if (selectedLocations.includes(index)) {
            selectedLocations = selectedLocations.filter(i => i !== index);
            bubble.classList.remove('selected');
        } else {
            selectedLocations.push(index);
            bubble.classList.add('selected');
        }
    }


    // Applies selected filters by reloading the page with the URL Paramaters
    function applyCategoryFilter() {
        const params = new URLSearchParams();
    
        if (selectedCategories.length > 0) {
            params.set('categories', selectedCategories.join(','));
        }
    
        if (selectedLocations.length > 0) {
            params.set('locations', selectedLocations.join(','));
        }
    
        window.location.href = `explore.html?${params.toString()}`;
    }


    // Reads if there are filters in the current URL
    function getFiltersFromURL() {
        const params = new URLSearchParams(window.location.search);
    
        let categoryFilters = [];
        let locationFilters = [];
    
        const categoriesParam = params.get('categories');
        const locationsParam = params.get('locations');
    
        if (categoriesParam) {
            categoryFilters = categoriesParam
                .split(',')
                .map(Number)
                .filter(n => !isNaN(n));
        }
    
        if (locationsParam) {
            locationFilters = locationsParam
                .split(',')
                .map(Number)
                .filter(n => !isNaN(n));
        }
    
        return {
            categories: categoryFilters,
            locations: locationFilters
        };
    }

    // Applies filter styles
    function applySelectedStyles() {
    // Categories
    document.querySelectorAll('#categoryFilters .category-bubble')
        .forEach(bubble => {
            const index = Number(bubble.dataset.index);
            bubble.classList.toggle('selected', selectedCategories.includes(index));
        });

    // Locations
    document.querySelectorAll('#locationFilters .category-bubble')
        .forEach(bubble => {
            const index = Number(bubble.dataset.index);
            bubble.classList.toggle('selected', selectedLocations.includes(index));
        });
    }// end applyStyles

    // Clear any selected filters
    function clearFilters() {
        window.location.href = 'explore.html';
    }

    // Render Attraction Tiles
    function renderTiles() {
        const container = document.getElementById('tilesContainer');
        container.innerHTML = '';
    
        let filteredPlaces = filterPlaces(window.places); // uses your filters
    
        filteredPlaces.forEach(place => {
            container.appendChild(createTile(place));
        });
    }

    // Create a tile
    function createTile(place) {
        const tile = document.createElement('div');
        tile.className = 'tile';
    
        const locationName = window.specificLocation[place.location] || 'Unknown';
        const categoryNames = (place.categories || []).map(i =>
            window.specificCategory[i] || 'Unknown'
        );
    
        tile.innerHTML = `
            <img src="${place.coverImg}" alt="${place.name}" loading="lazy">
    
            <div class="tile-content">
                <div class="tile-title">${place.name}</div>
                <div class="tile-location">${locationName}</div>
    
                <div class="tile-categories">
                    ${categoryNames.map(cat => `
                        <span class="tile-chip">${cat}</span>
                    `).join('')}
                </div>
            </div>
        `;
    
        // ✅ Click behavior
        tile.addEventListener('click', () => {
            window.location.href = `explore/place.html?n=${place.siteLink}`;
        });
    
        return tile;
    }



</script>

<script>
    initExplorePage();
</script>
</html>
